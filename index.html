<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:25px;max-width:380px;width:100%;text-align:center}
h1{font-size:1.3em;color:#ffd700;margin-bottom:5px}
.round-tag{display:inline-block;background:rgba(255,215,0,.2);color:#ffd700;padding:4px 16px;border-radius:15px;font-size:.85em;margin-bottom:10px}
.rules{background:rgba(0,0,0,.2);border-radius:12px;padding:12px;margin:8px 0;font-size:.72em;color:#aaa;text-align:left;line-height:1.6}
.rules span{color:#ffd700}
input{width:100%;padding:12px;border-radius:25px;border:2px solid rgba(255,215,0,.5);background:rgba(255,255,255,.08);color:#fff;font-size:1em;text-align:center;margin:10px 0;outline:none}
input:focus{border-color:#ffd700}
.btn{padding:13px 35px;border:none;border-radius:25px;font-size:1em;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033;margin:8px 0}
.btn:disabled{opacity:.4;pointer-events:none}
.win{color:#ffd700;font-size:1.3em;font-weight:bold}
.lose{color:#aaa}
.prize{color:#ffd700;font-size:.95em;margin-top:5px}
.time{color:#888;font-size:.75em;margin-top:5px}
.ended{color:#f66;font-size:1.1em;font-weight:bold}
.wait{color:#ffa500}
</style>
</head>
<body>
<div class="card">
  <h1>🎰 幸运抽奖</h1>
  <div class="round-tag" id="roundTag">加载中...</div>
  <div class="rules" id="rulesBox" style="cursor:pointer" onclick="toggleRules()">
    📋 中奖规则 ▾
  </div>
  <div id="rulesDetail" style="display:none;background:rgba(0,0,0,.2);border-radius:12px;padding:12px;margin:8px 0;font-size:.72em;color:#aaa;text-align:left;line-height:1.6">
    🏆 特等奖×1：燕京啤酒1箱+京东电饭煲1台<br>
    🥇 一等奖×1：燕京啤酒1箱<br>
    🥈 二等奖×1：燕京啤酒6瓶<br>
    🥉 三等奖×1：燕京啤酒2瓶<br>
    <hr style="border-color:#333;margin:8px 0">
    📌 共3轮，每轮奖品同上<br>
    ⚠️ 每人仅限抽奖一次，跨轮不重复中奖<br>
    ⚠️ 如因系统原因导致同一奖品被多人抽中，以最先抽中的记录为准<br>
  </div>
  <div id="content">
    <input id="nameInput" placeholder="请输入你的名字">
    <br><button class="btn" id="btn" onclick="go()">🎯 抽奖</button>
  </div>
  <div class="result" id="result"></div>
</div>

<script>
const RAW='https://api.github.com/repos/h1h1h1hhh/lottery2/contents/state2.json';
const TK='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const R=[
  {name:'🏆 特等奖',prize:'燕京啤酒1箱+京东电饭煲1台',count:1,rate:.05},
  {name:'🥇 一等奖',prize:'燕京啤酒1箱',count:1,rate:.15},
  {name:'🥈 二等奖',prize:'燕京啤酒6瓶',count:1,rate:.25},
  {name:'🥉 三等奖',prize:'燕京啤酒2瓶',count:1,rate:.55},
];
let state={cr:1,rs:{}},sha='',me='',busy=false;
function enc(s){const u=new TextEncoder().encode(s);return btoa(String.fromCharCode(...u));}
function dec(b){const a=atob(b);const u=new Uint8Array([...a].map(c=>c.charCodeAt(0)));return new TextDecoder().decode(u);}
function rw(){return state.rs[state.cr].w;}
function rwn(){return Object.values(rw()).flat().map(x=>x.n||x);}
function rt(){return 4;}
async function load(){
  try{
    const r=await fetch(RAW,{headers:{Authorization:'token '+TK},cache:'no-cache'});
    const d=await r.json();sha=d.sha;state=JSON.parse(dec(d.content));
    if(!state.rs||!state.rs[1]){state={cr:1,rs:{}};for(let i=1;i<=3;i++)state.rs[i]={w:{0:[],1:[],2:[],3:[]}};}
    document.getElementById('roundTag').textContent='第 '+state.cr+'/3 轮';
  }catch(e){console.error(e);}
}
async function save(){
  const b=JSON.stringify({message:'r',content:enc(JSON.stringify(state)),sha});
  const r=await fetch(RAW,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:b});
  const d=await r.json();sha=d.content.sha;
}
function allWon(){let t=0;for(let i=1;i<=3;i++){const w=state.rs[i].w;Object.values(w).forEach(a=>t+=a.length);}return t;}
async function go(){
  if(busy)return;
  if(localStorage.getItem('l2d')){document.getElementById('result').innerHTML='<p class="lose">每人只能抽一次哦</p>';return}
  const n=document.getElementById('nameInput').value.trim();
  if(!n){document.getElementById('result').innerHTML='<p class="lose">请输入名字</p>';return}
  me=n;busy=true;document.getElementById('btn').disabled=true;document.getElementById('btn').textContent='抽奖中...';
  await load();
  // 跨轮检查
  for(let r=1;r<=3;r++){const w=state.rs[r].w;for(let i=0;i<R.length;i++){if((w[i]||[]).some(x=>(x.n||x)===me)){showWin(me,R[i].prize,'');busy=false;return;}}}
  if(rwn().length>=rt()){
    if(state.cr>=3){showEnd();busy=false;return;}
    showWait();busy=false;return;
  }
  await new Promise(r=>setTimeout(r,1500+Math.random()*1500));
  await load();
  if(rwn().length>=rt()){
    if(state.cr>=3){showEnd();busy=false;return;}
    showWait();busy=false;return;
  }
  const wn=rwn().length;const rm=rt()-wn;
  const wr=Math.min(rm/Math.max(30-wn-allWon(),rm),.6);
  if(Math.random()<wr){
    let rnd=Math.random(),tier=-1,cum=0;
    for(let i=0;i<R.length;i++){if(rw()[i].length>=R[i].count)continue;cum+=R[i].rate;if(rnd<cum){tier=i;break;}}
    if(tier<0)tier=3;
    const now=new Date().toISOString();(rw()[tier]=rw()[tier]||[]).push({n:me,t:now});
    await save();localStorage.setItem('l2d','1');showWin(me,R[tier].prize,now);
  }else{localStorage.setItem('l2d','1');showLose();}
  busy=false;
}
function toggleRules(){var d=document.getElementById('rulesDetail');var b=document.getElementById('rulesBox');if(d.style.display==='none'){d.style.display='block';b.innerHTML='📋 中奖规则 ▴';}else{d.style.display='none';b.innerHTML='📋 中奖规则 ▾';}}
function showWin(name,prize,tm){document.getElementById('content').innerHTML='';document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="win">恭喜 '+name+'！</p><p class="prize">'+prize+'</p>'+(tm?'<p class="time">⏰ '+new Date(tm).toLocaleString()+'</p>':'')+'<p style="color:#aaa;font-size:.8em;margin-top:10px">请到领奖处领取</p>';}
function showLose(){document.getElementById('content').innerHTML='';document.getElementById('result').innerHTML='<p style="font-size:3em">😢</p><p class="lose">很遗憾，没有中奖</p>';}
function showWait(){document.getElementById('content').innerHTML='';document.getElementById('result').innerHTML='<p style="font-size:3em">⏳</p><p class="wait">本轮已结束</p><p style="color:#aaa">请等待下一轮</p>';}
function showEnd(){document.getElementById('content').innerHTML='';document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="ended">全部抽奖已结束</p>';}
load();
</script>
</body>
</html>
