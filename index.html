<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:30px;max-width:360px;width:100%;text-align:center}
h1{font-size:1.4em;color:#ffd700;margin-bottom:5px}
.round-tag{display:inline-block;background:rgba(255,215,0,.2);color:#ffd700;padding:4px 16px;border-radius:15px;font-size:.85em;margin-bottom:15px}
.wait-tag{background:rgba(255,165,0,.2);color:#ffa500;padding:10px 20px;border-radius:15px;font-size:.9em;margin:15px 0}
input{width:100%;padding:12px 18px;border-radius:30px;border:2px solid rgba(255,215,0,.5);background:rgba(255,255,255,.08);color:#fff;font-size:1.1em;text-align:center;margin:12px 0;outline:none}
input:focus{border-color:#ffd700}
.btn{padding:14px 40px;border:none;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033;margin:12px 0}
.btn:disabled{opacity:.4;pointer-events:none}
.result{margin-top:15px;font-size:1.1em}
.result .win{color:#ffd700;font-size:1.4em;font-weight:bold}
.result .lose{color:#aaa}
.result .prize{color:#ffd700;font-size:1em;margin-top:5px}
.result .ended{color:#f66;font-size:1.2em;font-weight:bold}
.result .wait{color:#ffa500;font-size:1em}
</style>
</head>
<body>
<div class="card" id="card">
  <h1>🎰 幸运抽奖</h1>
  <div class="round-tag" id="roundTag">第 1/3 轮</div>
  <div id="content">
    <input id="nameInput" placeholder="请输入你的名字">
    <br><button class="btn" id="btn" onclick="go()">🎯 抽奖</button>
  </div>
  <div class="result" id="result"></div>
</div>

<script>
const RAW='https://api.github.com/repos/h1h1h1hhh/lottery/contents/state2.json';
const TK='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const R=[
  {name:'🏆 特等奖',prize:'燕京啤酒1箱+京东家电电饭煲1台',count:1,rate:.02},
  {name:'🥇 一等奖',prize:'燕京啤酒1箱',count:2,rate:.10},
  {name:'🥈 二等奖',prize:'燕京啤酒6瓶',count:3,rate:.20},
  {name:'🥉 三等奖',prize:'燕京啤酒2瓶',count:6,rate:.68},
];
let state={currentRound:1,rounds:{}},sha='',me='',busy=false;

async function load(){
  try{
    const r=await fetch(RAW,{headers:{Authorization:'token '+TK},cache:'no-cache'});
    const d=await r.json();sha=d.sha;
    state=JSON.parse(atob(d.content));
    if(!state.rounds[1]) initRounds();
  }catch(e){console.error(e);initRounds();}
}

function initRounds(){
  state={currentRound:1,rounds:{}};
  for(let i=1;i<=3;i++){
    state.rounds[i]={winners:{0:[],1:[],2:[],3:[]},locked:false};
  }
}

async function save(){
  const c=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  const r=await fetch(RAW,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:JSON.stringify({message:'r',content:c,sha})});
  const d=await r.json();sha=d.content.sha;
}

function roundWinners(){return state.rounds[state.currentRound].winners;}
function allWonThisRound(){return Object.values(roundWinners()).flat();}
function totalThisRound(){return 12;}
function roundEnded(){return allWonThisRound().length>=totalThisRound();}

async function go(){
  if(busy)return;
  const n=document.getElementById('nameInput').value.trim();
  if(!n){document.getElementById('result').innerHTML='<p class="lose">请输入名字</p>';return}
  me=n;busy=true;
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='抽奖中...';

  await load();
  document.getElementById('roundTag').textContent='第 '+state.currentRound+'/3 轮';

  // 本轮是否已结束
  if(roundEnded()){
    if(state.currentRound>=3){
      showEndAll();
    }else{
      showWaitNext();
    }
    busy=false;return;
  }

  // 本轮是否已中过
  if(allWonThisRound().includes(me)){
    let p='';R.forEach((r,i)=>{if(roundWinners()[i].includes(me))p=r.prize;});
    showWin(me,p);busy=false;return;
  }

  // 转圈动画
  await new Promise(r=>setTimeout(r,1500+Math.random()*1500));

  await load(); // 再次拉取防止并发

  if(roundEnded()){
    if(state.currentRound>=3)showEndAll();
    else showWaitNext();
    busy=false;return;
  }

  const won=allWonThisRound().length;
  const remain=totalThisRound()-won;
  const estRemain=Math.max(50-won,remain);
  const winRate=Math.min(remain/estRemain,.6);

  if(Math.random()<winRate){
    const rnd=Math.random();
    let tier=-1,cum=0;
    for(let i=0;i<R.length;i++){
      if(roundWinners()[i].length>=R[i].count)continue;
      cum+=R[i].rate;
      if(rnd<cum){tier=i;break;}
    }
    if(tier<0) tier=3;
    roundWinners()[tier].push(me);
    await save();
    showWin(me,R[tier].prize);
  }else{
    showLose();
  }
  busy=false;
}

function showWin(name,prize){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="win">恭喜 '+name+'！</p><p class="prize">'+prize+'</p><p style="color:#aaa;font-size:.85em;margin-top:15px">请到领奖处领取奖品</p>';
}

function showLose(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">😢</p><p class="lose">很遗憾，没有中奖</p>';
}

function showWaitNext(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">⏳</p><p class="wait">本轮抽奖已结束</p><p style="color:#aaa;margin-top:10px">请等待下一轮开始</p>';
}

function showEndAll(){
  document.getElementById('content').innerHTML='';
  document.getElementById('result').innerHTML='<p style="font-size:3em">🎊</p><p class="ended">全部抽奖已结束</p><p style="color:#aaa;margin-top:10px">感谢参与！</p>';
}

load();
</script>
</body>
</html>
