<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a001f,#1a0033 50%,#0d0028);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#fff;padding:15px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:25px;max-width:400px;width:100%;text-align:center;margin:10px 0}
h1{font-size:1.3em;color:#ffd700;margin-bottom:5px}
.rtag{display:inline-block;background:rgba(255,215,0,.2);color:#ffd700;padding:4px 14px;border-radius:12px;font-size:.85em;margin-bottom:8px}
.rules{cursor:pointer;color:#aaa;font-size:.8em;margin:8px 0;padding:8px;background:rgba(0,0,0,.2);border-radius:8px}
.rules-detail{display:none;background:rgba(0,0,0,.2);border-radius:12px;padding:12px;margin:8px 0;font-size:.72em;color:#aaa;text-align:left;line-height:1.6}
input{width:100%;padding:12px;border-radius:25px;border:2px solid rgba(255,215,0,.5);background:rgba(255,255,255,.08);color:#fff;font-size:1em;text-align:center;margin:10px 0;outline:none}
input:focus{border-color:#ffd700}
.btn{padding:13px 35px;border:none;border-radius:25px;font-size:1em;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0033;margin:8px 0}
.win{color:#ffd700;font-size:1.2em;font-weight:bold}
.lose{color:#aaa}
.prize{color:#ffd700;font-size:.9em;margin-top:5px}
.ended{color:#f66;font-size:1.1em;font-weight:bold}
.wait{color:#ffa500}
.wlist{text-align:left;font-size:.8em;margin-top:10px;line-height:1.8}
.wlist .t{color:#ffd700;font-weight:bold}
.wlist .n{color:#fff;margin-left:5px}
</style>
</head>
<body>
<div class="card">
  <h1>🎰 幸运抽奖</h1>
  <div class="rtag" id="rt">加载中...</div>
  <div class="rules" id="rb" onclick="tg()">📋 中奖规则 ▾</div>
  <div class="rules-detail" id="rd">
    🏆 特等奖×1：燕京啤酒1箱+京东电饭煲1台<br>
    🥇 一等奖×1：燕京啤酒1箱<br>
    🥈 二等奖×1：燕京啤酒6瓶<br>
    🥉 三等奖×1：燕京啤酒2瓶<br>
    <hr style="border-color:#333;margin:6px 0">
    📌 共3轮，每轮4个奖品<br>
        <hr style="border-color:#555;margin:6px 0">
    📌 本活动最终解释权归主办方所有<br>
    📌 如遇网络故障等不可抗力，主办方有权调整活动规则<br>
    📌 中奖者须现场凭有效身份信息领取，离开现场视为放弃<br>
    📌 如对中奖结果有争议，以系统记录的先后顺序为准<br>
    📌 如遇特殊情况，主办方有权增设最终环节，具体规则由主持人现场决定<br>
    📌 同一姓名仅限参与一次，重复无效
  </div>
  <div id="area"></div>
</div>

<script>
const RAW='https://api.github.com/repos/h1h1h1hhh/lottery2/contents/state2.json';
const TK='ghp_'+'K9nIgzCtyWhjjCUTQTLatVnUEgbEXO1Bidv5';
const R=[
  {n:'🏆 特等奖',p:'燕京啤酒1箱+京东电饭煲1台',c:1},
  {n:'🥇 一等奖',p:'燕京啤酒1箱',c:1},
  {n:'🥈 二等奖',p:'燕京啤酒6瓶',c:1},
  {n:'🥉 三等奖',p:'燕京啤酒2瓶',c:1},
];
let S={cr:1,rs:{}},sha='',busy=false;
function enc(s){const u=new TextEncoder().encode(s);return btoa(String.fromCharCode(...u));}
function dec(b){const a=atob(b);const u=new Uint8Array([...a].map(c=>c.charCodeAt(0)));return new TextDecoder().decode(u);}
function tg(){var d=document.getElementById('rd');var b=document.getElementById('rb');if(d.style.display==='none'){d.style.display='block';b.innerHTML='📋 中奖规则 ▴';}else{d.style.display='none';b.innerHTML='📋 中奖规则 ▾';}}
function rw(){return S.rs[S.cr].w;}
function allNames(){let a=[];for(let i=1;i<=3;i++){const w=S.rs[i].w;Object.values(w).forEach(x=>x.forEach(y=>a.push(y.n)));}return a;}
function rwn(){return Object.values(rw()).flat().map(x=>x.n);}
function rt(){return 4;}function rall(){return 12;}
async function load(){
  try{
    const r=await fetch(RAW,{headers:{Authorization:'token '+TK},cache:'no-cache'});
    const d=await r.json();sha=d.sha;S=JSON.parse(dec(d.content));
    if(!S.rs||!S.rs[1]){S={cr:1,rs:{}};for(let i=1;i<=3;i++)S.rs[i]={w:{0:[],1:[],2:[],3:[]}};}
    document.getElementById('rt').textContent='第 '+S.cr+'/3 轮';
  }catch(e){console.error(e);}
}
async function save(){
  for(let i=0;i<8;i++){
    try{
      const b=JSON.stringify({message:'r',content:enc(JSON.stringify(S)),sha});
      const r=await fetch(RAW,{method:'PUT',headers:{Authorization:'token '+TK,'Content-Type':'application/json'},body:b});
      if(!r.ok){if(r.status===409){await load();await new Promise(x=>setTimeout(x,200+Math.random()*300));continue;}throw new Error('save fail');}
      const d=await r.json();sha=d.content.sha;return true;
    }catch(e){await load();await new Promise(x=>setTimeout(x,200+Math.random()*300));}
  }
  return false;
}
function render(){
  // All 12 prizes gone
  if(allNames().length>=rall()){
    let h='<p style="font-size:3em">🎊</p><p class="ended">全部抽奖已结束</p><div class="wlist">';
    for(let rn=1;rn<=3;rn++){
      h+='<p class="t">第'+rn+'轮</p>';
      const w=S.rs[rn].w;
      R.forEach((r,i)=>{if(w[i].length>0)w[i].forEach(x=>{h+='<span class="n">🏆 '+x.n+' - '+r.p+' ('+new Date(x.t).toLocaleString()+'.'+x.t.slice(20,23)+')</span><br>';});});
    }
    h+='</div>';document.getElementById('area').innerHTML=h;return;
  }
  // Current round ended but more rounds remain
  if(rwn().length>=rt()){
    let h='<p style="font-size:3em">⏳</p><p class="wait">第 '+S.cr+' 轮已结束</p><div class="wlist"><p class="t">本轮中奖名单：</p>';
    const w=S.rs[S.cr].w;
    R.forEach((r,i)=>{if(w[i].length>0)w[i].forEach(x=>{h+='<span class="n">🏆 '+x.n+' - '+r.p+' ('+new Date(x.t).toLocaleString()+'.'+x.t.slice(20,23)+')</span><br>';});});
    h+='</div><p style="color:#aaa;font-size:.8em;margin-top:10px">请等待下一轮开始</p>';
    document.getElementById('area').innerHTML=h;return;
  }
  document.getElementById('area').innerHTML='<input id="ni" placeholder="请输入你的名字"><br><button class="btn" onclick="go()">🎯 抽奖</button><div id="res"></div>';
}
async function go(){
  if(busy)return;
  const n=document.getElementById('ni').value.trim();
  if(!n){document.getElementById('res').innerHTML='<p class="lose">请输入名字</p>';return}
  await load();
  if(allNames().includes(n)){document.getElementById('res').innerHTML='<p class="lose">该名字已被使用，请换一个</p>';return}
  if(allNames().length>=rall()){render();return}
  if(rwn().length>=rt()){render();return}
  busy=true;
  document.getElementById('res').innerHTML='<p style="color:#ffd700">抽奖中...</p>';
  await new Promise(r=>setTimeout(r,1500+Math.random()*1500));
  await load();
  if(rwn().length>=rt()||allNames().length>=rall()){render();busy=false;return}
  const wn=allNames().length;const rm=rall()-wn;
  const wr=Math.min(rm/Math.max(10-wn,rm),.8);
  if(Math.random()<wr){
    let av=[];R.forEach((r,i)=>{if(rw()[i].length<r.c)av.push(i);});
    const tier=av[Math.floor(Math.random()*av.length)];
    rw()[tier].push({n, t:new Date().toISOString()});
    const ok=await save();await load();
    if(!ok){document.getElementById('res').innerHTML='<p class="lose">网络繁忙，请重试</p>';busy=false;return;}
    document.getElementById('res').innerHTML='<p style="font-size:3em">🎊</p><p class="win">恭喜 '+n+'！</p><p class="prize">'+R[tier].p+'</p>';
  }else{
    document.getElementById('res').innerHTML='<p style="font-size:3em">😢</p><p class="lose">很遗憾，没有中奖</p>';
  }
  if(rwn().length>=rt()||allNames().length>=rall()){setTimeout(render,2000);}
  busy=false;
}
load().then(render);
</script>
</body>
</html>
